[GoldenDict]
Executable=goldendict
DefaultWindowMode=popup

; Max 10 groups (Group_1 to Group_10)
[Groups]
; Dictionaries group in GoldenDict
Group_1=default
Group_2=translate
Group_3=grammar

[WindowModes]
; In the main window
Group_1=main
; In the pop-up window
Group_2=popup
Group_3=popup

[Hotkeys]
; GoldenDict's default key is Ctrl+c+c.
; Here is an alternate key.
Group_1=!+z
Group_2=!x
Group_3=!xx

[Messages]
NoSelectionMsg=No text copied. Please select the word to query first.